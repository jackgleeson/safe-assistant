# deny-paths.conf - Source of truth for LLM assistant deny rules
#
# Synced by:
#   bin/sync-deny-paths   -> ~/.claude/settings.json (Claude Code)
#   bin/sync-aiignore     -> .aiignore/.cursorignore/.codeiumignore (IDE assistants)
#
# This file is meant to be committed to the repo so the whole team
# shares the same deny list. Re-run the sync scripts after editing.
#
# Format:
#   - Glob patterns (contain * or ?) become Read() permission deny rules
#     and ignore file entries
#   - Concrete paths (starting with ~ / .) become Read() deny rules,
#     sandbox.filesystem.denyRead entries, and ignore file entries
#   - Lines prefixed with "bash:" become Bash() permission deny rules
#     (Claude Code only, not written to ignore files)
#   - Comments (#) and blank lines are ignored
#
# Paths starting with ~ are expanded to $HOME.
# Paths starting with . are relative to the project root.

# --- File patterns (matched anywhere in the tree) ---
**/*.env
**/*.key
**/*.pem
**/LocalSettings.php

# --- Specific paths ---
~/.ssh/*
config/
config-private/
# --- Project-specific paths (uncomment or add your own) ---
# ./LocalSettings.php
# ./config-private
# ./.env.local
# ./config/secrets.yml

# --- Bash commands to deny (Claude Code only) ---
bash: node *
bash: npm *
bash: php *
bash: composer *
